    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.8;
            padding: 4rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .layout { display: flex; gap: 4rem; }
        .sidebar { width: 160px; flex-shrink: 0; padding-top: 0.5rem; position: sticky; top: 4rem; align-self: flex-start; }
        .content { flex: 1; min-width: 0; }
        .header { margin-bottom: 2rem; }
        h1 { font-size: 2.2rem; font-weight: 400; margin-bottom: 0; color: #000000; letter-spacing: 0.02em; }
        a { color: #000000; text-decoration: none; font-weight: 500; border-bottom: 1px solid #000000; transition: opacity 0.2s ease; }
        a:hover { opacity: 0.6; }
        h1 a { border-bottom: none; }
        h1 a:hover { opacity: 1; }
        .korean { font-family: 'Noto Serif KR', serif; }
        .nav { display: flex; flex-direction: column; gap: 0.75rem; }
        .nav a { font-size: 1rem; font-weight: 400; color: #000000; text-decoration: none; border-bottom: none; letter-spacing: 0.03em; transition: opacity 0.2s ease; }
        .nav a:hover { opacity: 0.6; }
        .nav a { position: relative; display: inline; }
        @keyframes slideIn { from { width: 0; } to { width: 60%; } }
        .nav a::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background-color: #cccccc; }
        .nav a.active::after { animation: slideIn 0.4s ease forwards; }
        .header-divider { border: none; height: 1px; background-color: #000000; margin: 1rem 0 2.5rem 0; }
        .coming-soon { font-size: 1.1rem; font-style: italic; color: #666666; margin-top: 2rem; }
        .sidebar-social { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .social-links { display: flex; flex-direction: column; gap: 0.5rem; }
        .social-links a { font-size: 1rem; font-weight: 400; color: #000000; text-decoration: none; border-bottom: none; letter-spacing: 0.03em; transition: opacity 0.2s ease; }
        .social-links a:hover { opacity: 0.6; }
        .webring { display: flex; align-items: center; gap: 0.25rem; }
        .webring a { color: #000000; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s ease; border-bottom: none; }
        .webring a:hover { opacity: 0.6; }
        .webring-arrow { font-size: 1.15rem; font-weight: 400; user-select: none; color: #000000; }
        .webring-icon { width: 26px; height: 26px; filter: brightness(0); }
        @media (max-width: 768px) { body { padding: 2rem 1.5rem; } .layout { flex-direction: column; gap: 0; } .sidebar { width: 100%; padding-top: 0; margin-bottom: 1rem; position: static; } .nav { flex-direction: row; gap: 1.5rem; position: static; } .sidebar-social { flex-direction: row; gap: 1.5rem; margin-top: 1rem; } .social-links { flex-direction: row; gap: 1rem; } h1 { font-size: 2.2rem; } }
        @media (max-width: 480px) { body { padding: 1.5rem 1rem; } h1 { font-size: 1.8rem; } }
    </style>
</head>
